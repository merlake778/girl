<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Для тебя ❤️</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    text-align: center;
    color: white;
}

/* Контейнер */
.container {
    position: relative;
    top: 50%;
    transform: translateY(-50%);
}

/* Фото */
img {
    width: 260px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    animation: float 3s ease-in-out infinite;
}

/* Плавное "плавание" */
@keyframes float {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-15px); }
    100% { transform: translateY(0px); }
}

/* Заголовок */
h1 {
    margin-top: 20px;
    font-size: 32px;
}

/* Кнопки */
button {
    padding: 15px 25px;
    font-size: 18px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    position: absolute;
    transition: all 0.2s ease;
}

#yes {
    background: #28a745;
    left: 40%;
    top: 65%;
}

#no {
    background: #dc3545;
    left: 55%;
    top: 65%;
}

/* Сообщение */
#message {
    margin-top: 40px;
    font-size: 26px;
    min-height: 40px;
    animation: fadeIn 1s ease;
}

/* Появление текста */
@keyframes fadeIn {
    from {opacity: 0;}
    to {opacity: 1;}
}

/* Сердечки */
.heart {
    position: absolute;
    color: red;
    font-size: 20px;
    animation: fall linear infinite;
}

@keyframes fall {
    0% {transform: translateY(-10vh);}
    100% {transform: translateY(110vh);}
}
</style>
</head>

<body>

<audio id="music" autoplay loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<div class="container">
    <img src="https://i.ibb.co/Fq4yDP3C/IMG-2818.jpg" alt="Её фото">

    <h1>Ты соскучилась? ❤️</h1>

    <button id="yes">Да</button>
    <button id="no">Нет</button>

    <div id="message"></div>
</div>

<script>
const noBtn = document.getElementById('no');
const yesBtn = document.getElementById('yes');
const message = document.getElementById('message');

// Убегающая кнопка с плавностью
noBtn.addEventListener('mouseover', () => {
    const x = Math.random() * (window.innerWidth - 100);
    const y = Math.random() * (window.innerHeight - 100);

    noBtn.style.left = x + 'px';
    noBtn.style.top = y + 'px';
});

// Если поймает "Нет"
noBtn.addEventListener('click', () => {
    message.innerText = "Вечером разберемся 😏";
});

// Кнопка "Да"
yesBtn.addEventListener('click', () => {
    message.innerText = "Вот это правильно, милая ❤️";
    explodeHearts();
});

// Автонажатие "Да"
setTimeout(() => {
    yesBtn.click();
}, 4000);

// Генерация падающих сердечек
function createHeart() {
    const heart = document.createElement('div');
    heart.classList.add('heart');
    heart.innerText = '❤️';

    heart.style.left = Math.random() * 100 + 'vw';
    heart.style.animationDuration = (Math.random() * 3 + 2) + 's';
    heart.style.fontSize = (Math.random() * 20 + 15) + 'px';

    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 5000);
}

// Постоянный дождь сердечек
setInterval(createHeart, 300);

// Взрыв сердечек при "Да"
function explodeHearts() {
    for (let i = 0; i < 30; i++) {
        createHeart();
    }
}
</script>

</body>
</html>
